name: Infrastructure Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (hibernate or wakeup)'
        required: true
        default: 'hibernate'
        type: choice
        options:
          - hibernate
          - wakeup

env:
  PROJECT_ID: diamenu-489712
  REGION: asia-east1
  SQL_INSTANCE: vetoniodb
  SERVICE_BACKEND: diamenu-backend
  SERVICE_FRONTEND: diamenu-frontend

jobs:
  manage-infra:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Hibernate (Stop Infrastructure)
        if: github.event.inputs.action == 'hibernate'
        run: |
          echo "Checking Cloud SQL instance: ${{ env.SQL_INSTANCE }}..."
          CURRENT_POLICY=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} --format="value(settings.activationPolicy)" --project=${{ env.PROJECT_ID }})
          if [ "$CURRENT_POLICY" != "NEVER" ]; then
            echo "Hibernating Cloud SQL instance..."
            gcloud sql instances patch ${{ env.SQL_INSTANCE }} --activation-policy=NEVER --project=${{ env.PROJECT_ID }}
          else
            echo "Cloud SQL instance is already hibernated."
          fi
          
          echo "Scaling Cloud Run Backend to 0 (min=0, max=1)..."
          gcloud run services update ${{ env.SERVICE_BACKEND }} --min-instances=0 --max-instances=1 --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }}
          
          echo "Scaling Cloud Run Frontend to 0 (min=0, max=1)..."
          gcloud run services update ${{ env.SERVICE_FRONTEND }} --min-instances=0 --max-instances=1 --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }}
          
          echo "Infrastructure successfully hibernated to save costs."

      - name: Wake Up (Start Infrastructure)
        if: github.event.inputs.action == 'wakeup'
        run: |
          echo "Checking Cloud SQL instance: ${{ env.SQL_INSTANCE }}..."
          CURRENT_POLICY=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} --format="value(settings.activationPolicy)" --project=${{ env.PROJECT_ID }})
          if [ "$CURRENT_POLICY" != "ALWAYS" ]; then
            echo "Starting Cloud SQL instance..."
            gcloud sql instances patch ${{ env.SQL_INSTANCE }} --activation-policy=ALWAYS --project=${{ env.PROJECT_ID }}
          else
            echo "Cloud SQL instance is already awake."
          fi
          
          echo "Scaling Cloud Run Backend to max=10..."
          gcloud run services update ${{ env.SERVICE_BACKEND }} --min-instances=0 --max-instances=10 --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }}
          
          echo "Scaling Cloud Run Frontend to max=10..."
          gcloud run services update ${{ env.SERVICE_FRONTEND }} --min-instances=0 --max-instances=10 --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }}
          
          echo "Infrastructure successfully woken up."
