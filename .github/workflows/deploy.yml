name: Deploy to Cloud Run

on:
  push:
    branches:
      - production

env:
  PROJECT_ID: diamenu-489712
  REGION: asia-east1
  GAR_LOCATION: asia-east1
  REPOSITORY: diamenu-repo
  SERVICE_BACKEND: diamenu-backend
  SERVICE_FRONTEND: diamenu-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      # Build and Push Backend
      - name: Build Backend Image
        run: docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_BACKEND }}:${{ github.sha }} ./backend

      - name: Push Backend Image
        run: docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_BACKEND }}:${{ github.sha }}

      # Deploy Backend
      - name: Deploy Backend to Cloud Run
        id: deploy_backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_BACKEND }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_BACKEND }}:${{ github.sha }}
          env_vars: |-
            DEBUG=False
            DATABASE_URL=
            CLOUD_SQL_CONNECTION_NAME=diamenu-489712:asia-east1:vetoniodb
            DB_NAME=postgres
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_HOST_USER=resend
            EMAIL_HOST_PASSWORD=${{ secrets.RESEND_API_KEY }}
            DEFAULT_FROM_EMAIL=noreply@diamenu.online
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}
            DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
            GS_BUCKET_NAME=${{ secrets.GS_BUCKET_NAME }}
            VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
            GCP_SA_KEY=${{ secrets.GCP_SA_KEY }}
          flags: |
            --add-cloudsql-instances=diamenu-489712:asia-east1:vetoniodb
            --allow-unauthenticated

      # Build and Push Frontend
      - name: Build Frontend Image
        run: |
          docker build -f Dockerfile.web \
            --build-arg VITE_GEMINI_API_KEY="${{ secrets.VITE_GEMINI_API_KEY }}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            --build-arg VITE_API_BASE_URL="${{ steps.deploy_backend.outputs.url }}" \
            --build-arg VITE_PIXABAY_API_KEY="${{ secrets.VITE_PIXABAY_API_KEY }}" \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_FRONTEND }}:${{ github.sha }} .

      - name: Push Frontend Image
        run: docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_FRONTEND }}:${{ github.sha }}

      # Deploy Frontend
      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_FRONTEND }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_FRONTEND }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
